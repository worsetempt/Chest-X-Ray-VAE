seed: 42

data:
  root: data/chest_xray
  image_size: 64
  batch_size: 64
  num_workers: 4
  pin_memory: true

model:
  in_channels: 1
  latent_dim: 128
  hidden_dims: [32, 64, 128, 256]

train:
  epochs: 30
  lr: 0.0002
  beta: 0.25
  beta_warmup_epochs: 20
  device: auto

output:
  exp_dir: outputs/train_run
  save_every: 5
